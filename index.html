<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador ViAngel 3D con Regla</title>
    <style>
        body { margin: 0; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; background-color: #e0e0e0; }
        #controles { padding: 15px; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.1); z-index: 10; border-radius: 8px; margin: 10px; }
        .input-group { margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; }
        input[type="number"] { padding: 6px; border: 1px solid #ccc; border-radius: 4px; width: 60px; text-align: center; }
        label { font-weight: bold; font-size: 14px; }
        #canvas-container { flex-grow: 1; cursor: move; }
        h2 { margin-top: 0; margin-bottom: 10px; color: #333; font-size: 18px; text-align: center;}
        #instrucciones { font-size: 12px; color: #666; text-align: center; margin-top: 5px;}
    </style>
</head>
<body>

<div id="controles">
    <h2>Dimensiones Caja (cm)</h2>
    <div class="input-group">
        <label>Ancho (w):</label> <input type="number" id="ancho" value="50" oninput="actualizarCaja()">
        <label>Alto (h):</label> <input type="number" id="alto" value="50" oninput="actualizarCaja()">
        <label>Largo (l):</label> <input type="number" id="largo" value="50" oninput="actualizarCaja()">
    </div>
    <div id="instrucciones">Usa el mouse/dedo para rotar. Rueda/pellizco para zoom.</div>
</div>

<div id="canvas-container"></div>

<script type="module">
    import * as THREE from 'https://cdn.skypack.dev/three@0.132.2';
    import { OrbitControls } from 'https://cdn.skypack.dev/three@0.132.2/examples/jsm/controls/OrbitControls.js';
    import { TextGeometry } from 'https://cdn.skypack.dev/three@0.132.2/examples/jsm/geometries/TextGeometry.js';
    import { FontLoader } from 'https://cdn.skypack.dev/three@0.132.2/examples/jsm/loaders/FontLoader.js';

    let scene, camera, renderer, box, controls, font, labelsGroup;

    init();
    animate();

    function init() {
        // 1. Escena y Cámara
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0xd0d0d0);
        
        camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 1, 2000);
        camera.position.set(80, 80, 150);

        // 2. Renderizador
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // 3. Controles
        controls = new OrbitControls(camera, renderer.domElement);
        controls.enablePan = false; // Desactivar paneo para evitar perder la caja

        // 4. Luces
        const light = new THREE.DirectionalLight(0xffffff, 1.2);
        light.position.set(1, 1, 2).normalize();
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x505050));

        // 5. Crear la Regla Visual
        crearRegla();

        // 6. Grupo para las etiquetas de texto (para poder borrarlas)
        labelsGroup = new THREE.Group();
        scene.add(labelsGroup);

        // 7. Cargar fuente para las etiquetas y crear la caja inicial
        const loader = new FontLoader();
        loader.load('https://cdn.skypack.dev/three@0.132.2/examples/fonts/helvetiker_regular.typeface.json', function (response) {
            font = response;
            actualizarCaja(); // Crear la caja inicial solo después de cargar la fuente
        });

        window.addEventListener('resize', onWindowResize, false);
    }

    function crearRegla() {
        const materialLinea = new THREE.LineBasicMaterial({ color: 0x000000 });
        const geometriaLinea = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(-10, 0, 0), new THREE.Vector3(-10, 200, 0)]);
        const lineaRegla = new THREE.Line(geometriaLinea, materialLinea);
        scene.add(lineaRegla);

        // Marcas cada 10 cm
        for (let i = 0; i <= 200; i += 10) {
            let largoMarca = (i % 50 === 0) ? 5 : 2; // Marcas largas cada 50cm
            const puntosMarca = [new THREE.Vector3(-10 - largoMarca, i, 0), new THREE.Vector3(-10, i, 0)];
            const geoMarca = new THREE.BufferGeometry().setFromPoints(puntosMarca);
            const marca = new THREE.Line(geoMarca, materialLinea);
            scene.add(marca);
        }
    }

    function crearEtiqueta(texto, x, y, z) {
        if (!font) return;
        const textGeo = new TextGeometry(texto, {
            font: font,
            size: 6,
            height: 1,
            curveSegments: 12
        });
        const textMaterial = new THREE.MeshPhongMaterial({ color: 0x333333 });
        const mesh = new THREE.Mesh(textGeo, textMaterial);
        mesh.position.set(x, y, z);
        labelsGroup.add(mesh);
    }

    window.actualizarCaja = function() {
        if (!font) return;

        const w = parseFloat(document.getElementById('ancho').value) || 1;
        const h = parseFloat(document.getElementById('alto').value) || 1;
        const l = parseFloat(document.getElementById('largo').value) || 1;

        // Limpiar caja y etiquetas anteriores
        if (box) scene.remove(box);
        labelsGroup.clear();

        // Crear nueva geometría de caja
        const geometry = new THREE.BoxGeometry(w, h, l);
        const material = new THREE.MeshPhongMaterial({ 
            color: 0x8B4513, // Café cartón
            transparent: false
        });
        
        box = new THREE.Mesh(geometry, material);
        
        // Bordes negros
        const edges = new THREE.EdgesGeometry(geometry);
        const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x000000 }));
        box.add(line);

        scene.add(box);

        // Crear etiquetas de medidas
        crearEtiqueta(`${w} cm (Ancho)`, w/2 + 5, -5, l/2);
        crearEtiqueta(`${h} cm (Alto)`, -w/2 - 25, h/2 - 3, l/2);
        crearEtiqueta(`${l} cm (Largo)`, w/2 + 5, -5, -l/2 + 10);
        
        // Etiqueta de la regla
        crearEtiqueta(`${h} cm`, -30, h, 0);
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
        requestAnimationFrame(animate);
        renderer.render(scene, camera);
        if (labelsGroup) {
            // Hacer que las etiquetas siempre miren a la cámara
            labelsGroup.children.forEach(label => {
                label.quaternion.copy(camera.quaternion);
            });
        }
    }
</script>

</body>
</html>
